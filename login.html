<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InternSphere • Access</title>
  <meta
    name="description"
    content="Login or create your InternSphere account to access internships, workrooms, and dashboard tools."
  />
  <link rel="stylesheet" href="css/login.css" />
</head>
<body>
  <main class="page">

    <!-- LEFT -->
<section class="hero">

    <!-- Logo -->
  <div class="hero-logo">
    <img src="assets/images/Internsphere logo.png" alt="InternSphere Logo" >
  </div>

  <div class="hero-img">
    <img src="assets/images/visualsoflukas-N7Bjz9vY67E-unsplash.jpg" alt="Developer working on laptop">
  </div>
</section>
    <!-- RIGHT -->
    <section class="panel-wrap">
      <section class="panel">
        <div class="panel-head">
          <div class="panel-badge">Secure Access</div>
          <div class="panel-title">
            <h2 id="panelTitle">Login • Student</h2>
            <p id="panelDesc">Access your internship dashboard.</p>
          </div>
        </div>

        <div class="role-tabs" role="tablist" aria-label="Choose role">
          <button
            class="role-tab is-active"
            data-role="student"
            role="tab"
            aria-selected="true"
            type="button"
          >
            Student
          </button>
          <button
            class="role-tab"
            data-role="company"
            role="tab"
            aria-selected="false"
            type="button"
          >
            Company
          </button>
        </div>

        <div class="mode-switch" aria-label="Login or Sign up">
          <button class="mode-btn is-active" data-mode="login" aria-pressed="true" type="button">
            Login
          </button>
          <button class="mode-btn" data-mode="signup" aria-pressed="false" type="button">
            Sign up
          </button>
        </div>

        <div class="oauth">
          <button class="btn btn-soft" type="button" id="googleBtn">
            <span class="badge" aria-hidden="true">G</span>
            Continue with Google
          </button>
        </div>

        <div class="divider"><span>or continue with email</span></div>

        <form class="form" id="authForm" autocomplete="on">
          <label class="field">
            <span>Email address</span>
            <input type="email" id="email" placeholder="you@example.com" required />
          </label>

          <label class="field">
            <span>Password</span>
            <input type="password" id="password" placeholder="Enter your password" required />
          </label>

          <label class="field is-hidden" id="companyNameField">
            <span>Company name</span>
            <input type="text" id="companyName" placeholder="Enter company name" />
          </label>

          <div class="row">
            <label class="check">
              <input type="checkbox" id="remember" />
              <span>Remember me</span>
            </label>

            <button class="link-btn" type="button" id="forgotBtn">Forgot password?</button>
          </div>

          <button class="btn btn-primary" type="submit" id="submitBtn">Login</button>

          <div class="alt-actions">
            <button class="btn btn-ghost" type="button" id="switchBtn">
              Create an account
            </button>
          </div>
        </form>
      </section>
    </section>

  </main>

  <script type="module" src="js/login.js"></script>
</body>
</html>
